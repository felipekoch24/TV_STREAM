<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem está assistindo?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #111; 
            color: white; 
            font-family: 'Arial', sans-serif; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;
        }

        #tela-perfil {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
            transition: opacity 0.4s ease;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #fff;
            text-align: center;
        }

        input { 
            padding: 12px; 
            font-size: 16px; 
            border-radius: 4px; 
            border: none; 
            width: 80%; 
            max-width: 300px; 
            text-align: center; 
            background: #222;
            color: white;
            margin-bottom: 30px;
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px; 
            width: 100%;
            max-width: 600px;
            justify-items: center;
            margin-bottom: 30px;
        }

        .perfil { 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.2s;
            width: 100px;
        }

        .perfil img { 
            width: 100px; 
            height: 100px; 
            border-radius: 8px; 
            border: 4px solid transparent; 
            transition: 0.3s; 
            object-fit: cover;
            background: #222;
        }

        .perfil p {
            margin-top: 8px;
            font-size: 14px;
            color: #ccc;
        }

        @media (min-width: 600px) {
            .perfil { width: 120px; }
            .perfil img { width: 120px; height: 120px; }
        }

        .perfil:hover img { transform: scale(1.08); }
        .perfil.selecionado img { border-color: #e50914; }
        .perfil.selecionado p { color: #e50914; font-weight: bold; }

        button { 
            padding: 12px 40px; 
            background-color: #e50914; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 18px; 
            border-radius: 4px; 
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background-color: #c40812; }

        /* 🌀 Animação de carregamento */
        #tela-carregando {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .bolinhas {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .bolinha {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e50914;
            animation: pular 1.2s ease infinite;
        }

        .bolinha:nth-child(2) { animation-delay: 0.2s; }
        .bolinha:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pular {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-20px); opacity: 1; }
        }

        /* 🏠 Tela Home */
        #tela-home {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            background: #000;
        }

        .cabecalho {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-usuario {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-usuario img {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
        }

        .info-usuario h2 {
            font-size: 20px;
            color: #fff;
        }

        .conteudo-home {
            color: #ddd;
            font-size: 18px;
            text-align: center;
            padding: 40px 20px;
            background: #111;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- Tela de Escolha de Perfil -->
    <div id="tela-perfil">
        <h1>QUEM ESTÁ ASSISTINDO?</h1>
        <input type="text" id="nomeUsuario" placeholder="Digite seu nome">

        <div class="container">
            <!-- 🎭 AVATARES PRÉ-DEFINIDOS (LINKS DIRETOS) -->
            <div class="perfil" onclick="selecionar(this, 'Aventura', 'https://picsum.photos/id/1005/200/200')">
                <img src="https://picsum.photos/id/1005/200/200" alt="Aventura">
                <p>Aventura</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Anime', 'https://picsum.photos/id/1082/200/200')">
                <img src="https://picsum.photos/id/1082/200/200" alt="Anime">
                <p>Anime</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Herói', 'https://picsum.photos/id/1074/200/200')">
                <img src="https://picsum.photos/id/1074/200/200" alt="Herói">
                <p>Herói</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Explorador', 'https://picsum.photos/id/1012/200/200')">
                <img src="https://picsum.photos/id/1012/200/200" alt="Explorador">
                <p>Explorador</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Lendário', 'https://picsum.photos/id/1027/200/200')">
                <img src="https://picsum.photos/id/1027/200/200" alt="Lendário">
                <p>Lendário</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Místico', 'https://picsum.photos/id/1035/200/200')">
                <img src="https://picsum.photos/id/1035/200/200" alt="Místico">
                <p>Místico</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Veloz', 'https://picsum.photos/id/1060/200/200')">
                <img src="https://picsum.photos/id/1060/200/200" alt="Veloz">
                <p>Veloz</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Noturno', 'https://picsum.photos/id/1069/200/200')">
                <img src="https://picsum.photos/id/1069/200/200" alt="Noturno">
                <p>Noturno</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Fogo', 'https://picsum.photos/id/1079/200/200')">
                <img src="https://picsum.photos/id/1079/200/200" alt="Fogo">
                <p>Fogo</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Gelo', 'https://picsum.photos/id/1083/200/200')">
                <img src="https://picsum.photos/id/1083/200/200" alt="Gelo">
                <p>Gelo</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Raio', 'https://picsum.photos/id/1090/200/200')">
                <img src="https://picsum.photos/id/1090/200/200" alt="Raio">
                <p>Raio</p>
            </div>
            <div class="perfil" onclick="selecionar(this, 'Sombra', 'https://picsum.photos/id/1095/200/200')">
                <img src="https://picsum.photos/id/1095/200/200" alt="Sombra">
                <p>Sombra</p>
            </div>
        </div>

        <button onclick="entrar()">Entrar</button>
    </div>

    <!-- Tela de Carregamento -->
    <div id="tela-carregando">
        <div class="bolinhas">
            <div class="bolinha"></div>
            <div class="bolinha"></div>
            <div class="bolinha"></div>
        </div>
        <p>Carregando, aguarde...</p>
    </div>

    <!-- Tela Home Principal -->
    <div id="tela-home">
        <div class="cabecalho">
            <div class="info-usuario">
                <img id="avatar-usuario" src="" alt="Avatar">
                <h2>Bem-vindo, <span id="nome-usuario"></span>!</h2>
            </div>
            <button onclick="voltarPerfil()" style="padding: 8px 16px; font-size: 14px;">Trocar Perfil</button>
        </div>

        <div class="conteudo-home">
            <h3>🏠 Página Inicial</h3>
            <p>Aqui você vai colocar o player, séries, continuar assistindo e tudo mais!</p>
        </div>
    </div>

    <script>
        let avatarEscolhido = "";
        let caminhoImagem = "";

        function selecionar(elemento, nomeAvatar, urlImagem) {
            document.querySelectorAll('.perfil').forEach(p => p.classList.remove('selecionado'));
            elemento.classList.add('selecionado');
            avatarEscolhido = nomeAvatar;
            caminhoImagem = urlImagem;
        }

        function entrar() {
            const nome = document.getElementById('nomeUsuario').value.trim();
            
            if (nome === "") {
                alert("Por favor, digite seu nome!");
                return;
            }
            if (!caminhoImagem) {
                alert("Por favor, selecione um avatar!");
                return;
            }

            // Mostra carregamento
            const telaCarregando = document.getElementById('tela-carregando');
            telaCarregando.style.opacity = "1";
            telaCarregando.style.pointerEvents = "auto";

            setTimeout(() => {
                // Preenche dados
                document.getElementById('nome-usuario').textContent = nome;
                document.getElementById('avatar-usuario').src = caminhoImagem;

                // Troca telas
                document.getElementById('tela-perfil').style.display = "none";
                telaCarregando.style.opacity = "0";
                telaCarregando.style.pointerEvents = "none";
                document.getElementById('tela-home').style.display = "block";

                // Salva para usar no player
                localStorage.setItem('usuario_nome', nome);
                localStorage.setItem('usuario_avatar', caminhoImagem);

            }, 1500);
        }

        function voltarPerfil() {
            document.getElementById('tela-home').style.display = "none";
            document.getElementById('tela-perfil').style.display = "flex";
            avatarEscolhido = "";
            caminhoImagem = "";
            document.querySelectorAll('.perfil').forEach(p => p.classList.remove('selecionado'));
        }

        // Abre direto se já tiver perfil salvo
        window.onload = () => {
            const nomeSalvo = localStorage.getItem('usuario_nome');
            const avatarSalvo = localStorage.getItem('usuario_avatar');
            if (nomeSalvo && avatarSalvo) {
                document.getElementById('nome-usuario').textContent = nomeSalvo;
                document.getElementById('avatar-usuario').src = avatarSalvo;
                document.getElementById('tela-perfil').style.display = "none";
                document.getElementById('tela-home').style.display = "block";
            }
        };
    </script>

</body>
</html>
