<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>TV PLAYER</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
         video { width: 100vw; height: 100vh; }
         #menu { 
         position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
         background: #000; padding: 40px; z-index: 100; 
         display: flex; flex-direction: column; overflow-y: auto;
         }
         #lista { display: flex; flex-wrap: wrap; gap: 30px; padding: 20px; }
         /* Botão Padrão (Episódios) */
         button { 
         display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
         width: 280px; height: 380px; padding: 15px; background: #111; color: #fff; 
         border: 3px solid #333; font-size: 22px; font-weight: bold; cursor: pointer; transition: transform 0.2s;
         }
         button img { 
         width: 250px !important; height: 250px !important; object-fit: cover; 
         margin-bottom: 15px; border-radius: 4px; display: block;
         }
         /* VOLTAR VIDEO BOTÃO */
         #btn-voltar-video {
         position: absolute; top: 20px; right: 20px;
         z-index: 600; padding: 10px 20px;
         background: rgba(0, 0, 0, 0.6); color: white;
         border: 2px solid white; border-radius: 5px;
         cursor: pointer; display: none; /* Começa escondido */
         pointer-events: auto; /* Garante que o mouse/controle consiga clicar */}
         #btn-voltar-video:focus { background: white; color: black; }
         /* ESTILO ESPECIAL PARA BOTÕES DE NAVEGAÇÃO (Voltar, Anterior, Próximo) */
         .nav-btn { width: 280px !important; height: 100px !important; justify-content: center !important; }
         .nav-btn img { display: none !important; }
         /* MOSTRAR TEMPO, ALGO ASSIM */
         #infobar {
         position: absolute;
         bottom: 0;
         left: 0;
         width: 100%;
         background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
         color: #fff;
         padding: 20px;
         display: none; /* Inicia escondido */
         z-index: 500;
         font-size: 20px;
         box-sizing: border-box;
         }
         /* Barra de progresso estilo MX */
         #barra-progresso {
         width: 100%;
         height: 6px;
         background: #444;
         margin-bottom: 10px;
         cursor: pointer;
         }
         /* PROGRESSO ATUAL */
         #progresso-atual {
         height: 100%;
         background: #ff3e3e; /* Cor do seu tema */
         width: 0%;
         }
         /* Container que vai organizar as teclas em grade */
         #teclado-virtual {
         display: grid;
         grid-template-columns: repeat(9, 1fr); /* 9 colunas fica ótimo na TV */
         gap: 10px;
         margin-top: 20px;
         }
         /* TECLADO VIRTUAL */
         #teclado-virtual button {
         padding: 15px;
         font-size: 1.2em;
         background: #333;
         color: white;
         border: none;
         cursor: pointer;
         }
         #teclado-virtual button:focus {
         background: #e50914; /* Cor de destaque (vermelho Netflix) quando focado */
         transform: scale(1.1); /* Dá um efeito de "crescer" no controle remoto */
         }
    </style>
</head>

<body>
    <video id="video"></video>
    <div id="menu">
        <div id="barra-busca" style="padding: 10px;">
            <input type="text" id="campo-procura" placeholder="DIGITE O NOME..." oninput="filtrarSeries()">
            <div id="teclado-virtual"></div>
        </div>
        <h2 id="titulo-selecione">SELECIONE A SÉRIE</h2>
        <h2 id="titulo-continuar">CONTINUAR ASSISTINDO</h2>
        <div id="lista-continuar" style="display: flex; gap: 15px; margin-bottom: 40px;"></div>
        <h2 id="titulo-todas">TODAS AS SÉRIES</h2>
        <div id="lista"></div>
    </div>
    <div id="infobar">
        <div id="barra-progresso" onclick="buscarNoVideo(event)">
            <div id="progresso-atual"></div>
        </div>
        <div id="aviso-prox-container" style="display: none; text-align: center; margin-top: 20px;">
            <p style="font-size: 18px; margin-bottom: 10px;">PRÓXIMO VÍDEO EM <span id="contador">10</span>s</p>
            <button id="btn-pular" onclick="pularEpisodio()" style="padding: 10px 20px; cursor: pointer;">PULAR</button>
            <button id="btn-cancelar" onclick="cancelarPulo()" style="padding: 10px 20px; cursor: pointer;">CANCELAR</button>
        </div>
        <span id="tempo">00:00 / 00:00</span>
    </div>
    <script>
        // ============================================
         // 1. VARIÁVEIS GLOBAIS
         // ============================================
         let series = [];
         const video = document.getElementById('video');
         const lista = document.getElementById('lista');
         const menu = document.getElementById('menu');
         const infobar = document.getElementById('infobar');
         let hls = new Hls();
         let serieAtual = null;
         let tempAtual = null;
         let paginaEpisodio = 0;
         let timerPulo = null;
         let segundosRestantes = 10;
         let episodioAtual = 0;
         // ============================================
         // 2. CARREGAMENTO DE DADOS
         // ============================================
         async function carregarSeries() {
             try {
                 const resposta = await fetch('series1.json'); 
                 series = await resposta.json();
                 console.log("Séries carregadas com sucesso!");
                 
                 // SÓ RODA DEPOIS QUE CARREGAR
                 renderizarMenu();
                 renderizarContinuarAssistindo();
             } catch (erro) {
                 console.error("Erro ao carregar o JSON:", erro);
                 lista.innerHTML = "<h2 style='color:red'>Erro ao carregar séries. Verifique o arquivo series1.json</h2>";
             }
         }
         
         //2.1 VARIÁVEIS DE PAGINAÇÃO
         let paginaAtual = 0;
         let listaEps = [];
         
         // ============================================
         // 2.2 INICIALIZAÇÃO
         // ============================================
         carregarSeries(); // Chama a função para buscar o JSON ao abrir
         //VOLTAR PARA MENU
         function voltarParaMenu() {
             video.pause();
             document.getElementById('infobar').style.display = 'none';
             document.getElementById('btn-voltar-video').style.display = 'none';
             menu.style.display = 'flex';
         }
          // ============================================
         // 3. FUNÇÕES DE RENDERIZAÇÃO
         // ============================================
         function renderizarMenu() {
             lista.innerHTML = "";
             series.forEach(s => {
                 let btn = document.createElement('button');
                 btn.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/250'"><span>${s.nome}</span>`;
                 btn.onclick = () => renderizarEps(s);
                 lista.appendChild(btn);
             });
             lista.querySelector('button')?.focus();
         }
         
         
         // 3.1 FUNÇÃO RENDERIZAR EPS (Escolha de Temporadas)
         function renderizarEps(s) {
             serieAtual = s;
             lista.innerHTML = '';
             let titulo = document.createElement('h2');
             titulo.innerText = s.nome;
             lista.appendChild(titulo);
         
             s.temporadas.forEach((temp) => {
                 let btn = document.createElement('button');
                 btn.innerHTML = `<span>Temporada ${temp.n}</span>`;
                 btn.onclick = () => mostrarEpisodiosDaTemporada(temp, s);
                 lista.appendChild(btn);
             });
         
             let btnVoltar = document.createElement('button');
             btnVoltar.innerText = "⬅ VOLTAR";
             btnVoltar.onclick = () => renderizarMenu();
             lista.appendChild(btnVoltar);
         }
         
         // 3.2 FUNÇÃO LISTAR EPISÓDIOS (Dentro da Temporada)
         // VARIÁVEL PARA CONTROLAR A PÁGINA DENTRO DA TEMPORADA
         let paginaEpisodio = 0;
         function mostrarEpisodiosDaTemporada(temp, serie, pagina = 0) {
             tempAtual = temp; 
             serieAtual = serie;
             lista.innerHTML = '';
             paginaEpisodio = pagina;
             
             let btnVoltar = document.createElement('button');
             btnVoltar.className = 'nav-btn';
             btnVoltar.innerText = "⬅ VOLTAR ÀS TEMPORADAS";
             btnVoltar.onclick = () => renderizarEps(serie);
             lista.appendChild(btnVoltar);
         
             let start = temp.start || 1;
             let totalEps = temp.total;
             let inicio = paginaEpisodio * 6;
             let fim = Math.min(inicio + 6, totalEps);
         
             for (let i = inicio; i < fim; i++) {
                 let epNum = start + i;
                 let epFormatado = epNum.toString().padStart(2, '0');
                 let url = `https://cdn-s01.mywallpaper-4k-image.net/stream/${temp.pasta}/${epFormatado}.mp4/index.m3u8`;
                 
                 let btn = document.createElement('button');
                 btn.innerHTML = `<img src="${serie.img}"> <span>Episódio ${epNum}</span>`;
                 btn.onclick = () => tocar(url);
                 lista.appendChild(btn);
             }
         }
         
             // Botões de Navegação da Paginação
             if (paginaEpisodio > 0) { // Se você está na página 1, 2, 3... significa que existe uma página atrás.
                 let btnAnt = document.createElement('button'); // Cria o botão
                 btnAnt.className = 'nav-btn';
                 btnAnt.innerText = "⬅ ANTERIOR"; 
                 btnAnt.onclick = () => mostrarEpisodiosDaTemporada(tempAtual, serieAtual, paginaEpisodio - 1); // MÁGICA: Ao clicar, chama a mesma função, mas subtrai 1 da página atual
                 lista.appendChild(btnAnt);// Joga na tela
             }
             // BLOCO 2: O botão "PRÓXIMO"
             if (fim < totalEps) { // Se o último episódio que estamos vendo (fim) for menor que o total...
                 let btnProx = document.createElement('button'); // ...é porque ainda tem mais episódios lá na frente.
                 btnProx.className = 'nav-btn';
                 btnProx.innerText = "PRÓXIMO ➡";
                 btnProx.onclick = () => mostrarEpisodiosDaTemporada(tempAtual, serieAtual, paginaEpisodio + 1); // MÁGICA: Ao clicar, chama a mesma função, mas soma 1 na página atual
                 lista.appendChild(btnProx); // Joga na tela
             }
         }
         // 3.3 FUNÇÃO FILTRAR SÉRIES PRA ABA PESQUISAR
         function filtrarSeries() {
             let termo = document.getElementById('campo-procura').value.toLowerCase();
             let botoes = document.querySelectorAll('#menu button'); // Seus botões de série
             
             //VERIFICADOR
             botoes.forEach(btn => { 
                 // Verifica se o texto do botão contém o que você digitou
                 if (btn.innerText.toLowerCase().includes(termo)) { // .toLowerCase() transforma tudo em minúsculo para a busca não dar erro de digitação (ex: "Naruto" == "naruto")
                     btn.style.display = 'block'; // SE SIM (Achou): Mostra o botão na tela 
                 } else {
                     btn.style.display = 'none'; // SE NÃO (Não achou): Esconde o botão (display: none faz ele desaparecer)
                 }
             });
         
             // 3.4 Botões de Navegação (Anterior/Próximo)
             if (paginaAtual > 0) { // Verifica se a página atual é maior que 0 (ou seja, se existe uma página antes da atual)
                 let b = document.createElement('button'); // Cria o botão
                 b.className = 'nav-btn'; // Aplica o estilo CSS de botão pequeno
                 b.innerText = "⬅ ANTERIOR"; // Escreve o texto
                 b.onclick = () => { paginaAtual--; mostrarPagina(s); }; // AÇÃO: Se clicar, diminui 1 da página e chama a função de novo para redesenhar a tela
                 lista.appendChild(b); // Coloca o botão na lista
         
             }
             if (fim < listaEps.length) { // Verifica se o último episódio exibido (fim) é menor que o total de episódios (listaEps.length)
                 let b = document.createElement('button'); // Cria o botão
                 b.className = 'nav-btn';
                 b.innerText = "PRÓXIMO ➡";
                 b.onclick = () => { paginaAtual++; mostrarPagina(s); }; // AÇÃO: Se clicar, aumenta 1 na página e chama a função de novo
                 lista.appendChild(b); // Coloca o botão na lista
             }
             lista.querySelector('button').focus(); // Isso é essencial para que você possa usar o controle da TV logo de cara
         }        
         // ============================================
         // 4. FUNÇÕES DE PLAYER E UTILITÁRIOS
         // ============================================
         function tocar(url) {
             let match = url.match(/\/(\d+)\.mp4/);
             episodioAtual = match ? parseInt(match[1]) : 0;
             menu.style.display = 'none';
             if(hls) hls.destroy();
             hls = new Hls();
             hls.loadSource(url);
             hls.attachMedia(video);
             hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
         }
         // 4.1 MOSTRAR CONTADOR PLAY
         function mostrarContador() { // Mostra na tela o container que diz "PRÓXIMO VÍDEO EM X SEGUNDOS"
             document.getElementById('aviso-prox-container').style.display = 'block';
             infobar.style.display = 'block'; // Garante que o infobar apareça
             
             timerPulo = setInterval(() => { // O 'setInterval' é um relógio interno que roda uma função a cada 1000 milissegundos (1 segundo)
                 segundosRestantes--; // Diminui 1 segundo do contador
                 document.getElementById('contador').innerText = Math.round(segundosRestantes); // Atualiza o texto na tela, arredondando o número para ficar bonito (sem decimais)
                 
                 if (segundosRestantes <= 0) { // Quando o relógio chega em zero, ele chama a função que pula para o próximo vídeo
                     pularEpisodio();
                 }
             }, 1000);
         }
         //4.2 PULAR EPISÓDIO PLAY
         function pularEpisodio() {
             clearInterval(timerPulo);
             timerPulo = null;
             segundosRestantes = 10;
             document.getElementById('aviso-prox-container').style.display = 'none';
         
             // Aqui você pega o número do episódio atual e soma 1
             let proximoNum = episodioAtual + 1;
             
             // O pulo do gato: chamamos a função 'tocar' montando a URL manualmente
             // Precisamos garantir que a pasta e a estrutura sejam mantidas
             // Dica: 'serieAtual' e 'tempAtual' precisam estar definidas globalmente!
             let epFormatado = proximoNum.toString().padStart(2, '0');
             let url = `https://cdn-s01.mywallpaper-4k-image.net/stream/${tempAtual.pasta}/${epFormatado}.mp4/index.m3u8`;
             
             tocar(url);
         }
         //4.3 CANCELAR PULO PLAY
         function cancelarPulo() {
             clearInterval(timerPulo);
             document.getElementById('aviso-prox-container').style.display = 'none';
             timerPulo = null;
             segundosRestantes = 10;
         }
         // Este bloco cuida de MOSTRAR O TEMPO NA TELA , VIDEO.ONTIME
             video.ontimeupdate = () => {
             let tempoElemento = document.getElementById('tempo');
             let progresso = document.getElementById('progresso-atual');
             let cur = video.currentTime;
             let dur = video.duration || 0;
             
             tempoElemento.innerText = formatarTempo(cur) + " / " + formatarTempo(dur);
             progresso.style.width = ((cur / dur) * 100) + "%";
         
             if (dur - cur <= 10 && dur - cur > 0 && !timerPulo) mostrarContador();
         
             if (serieAtual) {
                 localStorage.setItem('progresso_' + video.currentSrc, cur);
                 localStorage.setItem('duracao_' + video.currentSrc, dur);
                 localStorage.setItem('img_' + video.currentSrc, serieAtual.img);
                 localStorage.setItem('nome_' + video.currentSrc, serieAtual.nome);
             }
         };
         // 4.4 Função para clicar na barra e pular o vídeo (estilo MX)
         function buscarNoVideo(e) {
             let barra = document.getElementById('barra-progresso');
             let clickX = e.offsetX;
             let larguraTotal = barra.offsetWidth;
             let novaPosicao = (clickX / larguraTotal) * video.duration;
             video.currentTime = novaPosicao;
         }
         // 4.5 Função auxiliar para deixar o TEMPO BONITO (00:00)
         function formatarTempo(segundos) {
             let min = Math.floor(segundos / 60);
             let seg = Math.floor(segundos % 60);
             return (min < 10 ? "0" + min : min) + ":" + (seg < 10 ? "0" + seg : seg);
         }
         
         // 4.6 COMANDOS DO CONTROLE E TECLADO PRA FUNCIONAR FIRE STICK
         document.addEventListener('keydown', (e) => { //Este é o bloco mais importante para TV. Ele "escuta" o que você aperta no controle:
             // 1. Pegamos todos os botões visíveis dentro da lista
             const botoes = Array.from(document.querySelectorAll('#lista button'));
             const index = botoes.indexOf(document.activeElement);
         
             // 2. Se o MENU estiver ABERTO:
             if (menu.style.display !== 'none') {
                 // SETA DIREITA : PROXIMO EPISODIO NA PAGINAÇÃO, IR PRA FRENTE
                 if (e.keyCode === 39 && index < botoes.length - 1) {
                     e.preventDefault();
                     botoes[index + 1].focus();
                 }
                 // SETA ESQUERDA: EPISÓDIO ANTERIOR NA PAGINAÇÃO, IR PRA TRÁS
                 if (e.keyCode === 37 && index > 0) {
                     e.preventDefault();
                     botoes[index - 1].focus();
                 }
                 // Enter no menu: executa a função do botão (clica nele)
                 if (e.keyCode === 13) {
                     e.preventDefault();
                     document.activeElement.click(); 
                 }
             } 
             // 3. Se o VÍDEO estiver rodando (MENU ESCONDIDO:
             else {
                 // Setas para avançar/retroceder 10 segundos
                 if (e.keyCode === 37) { e.preventDefault(); video.currentTime -= 10; } // REGRIDE SETA ESQUERDA
                 if (e.keyCode === 39) { e.preventDefault(); video.currentTime += 10; } // AVANÇA SETA DIREITA
                 // SETA PARA BAIXO: Volta para o menu (Invisível e limpo)
             if (e.keyCode === 40) { // SETA PRA BAIXO
                 e.preventDefault();
                 video.pause();
                 infobar.style.display = 'none';
                 menu.style.display = 'flex';
                 lista.querySelector('button').focus(); // Foca no primeiro botão do menu
             }
             // Enter no vídeo: PLAY/PAUSE e mostra/esconde o tempo
             if (e.keyCode === 13) {
                 e.preventDefault();
                 if (video.paused) { 
                     video.play(); 
                     infobar.style.display = 'none'; 
                 } else { 
                     video.pause(); 
                     infobar.style.display = 'block'; 
                 }
             }
                 // Tecla 8 (Back): volta para o menu
                 if (e.keyCode === 8) { 
                     e.preventDefault();
                     menu.style.display = 'flex'; 
                     infobar.style.display = 'none'; 
                     video.pause(); 
                 }
             }
         });
                //4.7 CONTINUAR ASSISTINDO
                function renderizarContinuarAssistindo() {
             const listaContinuar = document.getElementById('lista-continuar'); //Localiza a caixa na tela onde os botões de "Continuar Assistindo" vão aparecer.
             listaContinuar.innerHTML = "";  // Limpa essa caixa antes de começar, para não duplicar botões toda vez que você abrir o menu.
         
             for (let i = 0; i < localStorage.length; i++) { // Esse é o "garimpeiro". Ele percorre toda a memória do navegador procurando por qualquer chave que você salvou lá.
                 let chave = localStorage.key(i);
                 
                 if (chave.startsWith('progresso_')) { // Aqui ele filtra: "Eu só quero as chaves que começam com o nome progresso_". Ele ignora todo o resto.
                     let url = chave.replace('progresso_', ''); // Ele pega o nome da chave e remove o prefixo progresso_ para recuperar a URL original do vídeo.
                     let tempo = parseFloat(localStorage.getItem(chave)); // Ele vai buscar os dados salvos: em que segundo você parou (tempo) e qual o tamanho total do vídeo (duracao).
                     let duracao = parseFloat(localStorage.getItem('duracao_' + url)) || 1; // Pega do storage
                     let img = localStorage.getItem('img_' + url);
                     let nome = localStorage.getItem('nome_' + url);
         
                     // A trava dos 90% (0.9)
                     if (tempo > 10 && (tempo / duracao) < 0.9) {
                         let btn = document.createElement('button');
                         btn.innerHTML = `<img src="${img}" style="width: 80px; height: 80px; object-fit: cover;"> <span>${nome}</span>`;
                         
                         btn.onclick = () => {
                             tocar(url);
                             // Damos um tempo para o HLS carregar o vídeo antes de pular para o tempo
                             setTimeout(() => { video.currentTime = tempo; }, 1000);
                         };
                         listaContinuar.appendChild(btn);
                     }
                 }
             }
         }         
             // 4.8 PARTE TECLADO VIRTUAL
         // FUNÇÃO ADICIONAR LETRA TECLADO
         function addLetra(letra) { // O Digitador
             let input = document.getElementById('campo-procura'); // Localiza a caixa de texto onde o nome da série aparece.
             input.value += letra; // Pega o que já está escrito lá e "soma" (concatena) a nova letra que você apertou.
             filtrarSeries(); ////A parte mais importante. Assim que você adiciona uma letra, ele chama a função de busca imediatamente para esconder as séries que não combinam com o novo termo.
         }
         
         // 4.9 FUNÇÃO APAGAR LETRAS TECLADO
         function apagarLetra() { // O Corretor
             let input = document.getElementById('campo-procura');
             input.value = input.value.slice(0, -1); //Isso é uma função de corte. O slice(0, -1) diz ao computador: "pegue o texto do começo até o penúltimo caractere". Ou seja, ele remove a última letra da string.
             filtrarSeries(); //Chama a busca de novo para atualizar a lista, já que você apagou uma letra.
         }
         
         // 5 CRIA O TECLADO
         function criarTeclado() {// O Gerador
             const container = document.getElementById('teclado-virtual');
             const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789⌫";// Define todos os botões que o teclado vai ter.
             
             container.innerHTML = ""; // Limpa antes de criar
             letras.split('').forEach(l => { // Ele pega essa string longa de letras e quebra em pedacinhos individuais. Para cada pedacinho, ele cria um botão físico na tela.
                 let btn = document.createElement('button');
                 btn.innerText = l;
                 btn.onclick = () => {
                     if (l === '⌫') apagarLetra(); // Ele diferencia o que é uma letra normal (que precisa ser adicionada) do comando de apagar (que precisa executar a função apagarLetra).
                     else addLetra(l);
                 };
                 container.appendChild(btn);
             });
         }
         
         // --- CHAMADAS DE INICIALIZAÇÃO ---
         // Estas funções rodam assim que o script é carregado
         criarTeclado();
         // Não chame renderizarMenu aqui, o carregarSeries() já o chama após buscar o JSON
         // RENDERIZAR MENU
                 renderizarMenu();
                 // Adicione esta linha:
             renderizarContinuarAssistindo();
    </script>
</body>

</html>
