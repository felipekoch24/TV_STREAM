<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TV STREAM - Perfis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund01.jpg');
            background-size: cover;
            background-position: center;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        .tela {
            display: none;
            width: 100vw;
            height: 100vh;
            padding: 40px;
        }

        .tela.ativa {
            display: block;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 36px;
        }

        .voltar {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            outline: none;
        }

        .focado {
            border: 4px solid #0099ff;
            box-shadow: 0 0 20px #0099ff;
            transform: scale(1.05);
            transition: all 0.2s ease;
        }

        .lista-perfis {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            justify-items: center;
        }

        .perfil-item {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            width: 220px;
            cursor: pointer;
            outline: none;
        }

        .perfil-item img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid transparent;
        }

        .perfil-item p {
            font-size: 26px;
            font-weight: bold;
        }

        .botao {
            padding: 20px 40px;
            font-size: 28px;
            background: #0099ff;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            outline: none;
        }

        .form-container {
            max-width: 600px;
            margin: 80px auto;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 20px;
            font-size: 28px;
            margin: 20px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        .grade-avatares {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
            justify-items: center;
        }

        .avatar-opcao {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid transparent;
            outline: none;
            background: #222;
        }

        .categoria {
            margin-bottom: 50px;
        }

        .categoria h3 {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
            color: #ddd;
        }
    </style>
</head>
<body>

<!-- 📺 Tela Principal TV STREAM -->
<div id="tela-inicial" class="tela ativa">
    <h1>TV STREAM</h1>
    <h2>Quem está assistindo?</h2>
    <div class="lista-perfis" id="listaPerfis"></div>
    <div style="text-align: center; margin-top: 40px;">
        <button class="botao" id="btnNovoPerfil">+ Novo Perfil</button>
    </div>
</div>

<!-- 📝 Digitar Nome do Perfil -->
<div id="tela-nome" class="tela">
    <button class="voltar" id="voltarNome">← Voltar</button>
    <h2>Criar Novo Perfil</h2>
    <div class="form-container">
        <label style="font-size: 28px;">Digite seu nome:</label>
        <input type="text" id="inputNome" placeholder="Ex: Felipe" autofocus>
        <button class="botao" id="btnEscolherAvatar" style="width:100%; margin-top:20px;">Escolher Imagem</button>
    </div>
</div>

<!-- 🎭 Escolher Imagem de Perfil -->
<div id="tela-avatar" class="tela">
    <button class="voltar" id="voltarAvatar">← Voltar</button>
    <h2>Escolha sua Imagem</h2>

    <div class="categoria">
        <h3>Masculino</h3>
        <div class="grade-avatares">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc01.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc02.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc03.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc04.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc05.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc06.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc07.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc08.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc09.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc10.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc11.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc12.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc13.jpg">
        </div>
    </div>

    <div class="categoria">
        <h3>Feminino</h3>
        <div class="grade-avatares">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin01.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin02.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin03.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin04.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin05.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin06.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin07.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin08.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin09.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin10.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin11.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin12.jpg">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin13.jpg">
        </div>
    </div>
</div>

<script>
let perfis = JSON.parse(localStorage.getItem('perfisTVSTREAM')) || [];
let nomeAtual = '';

function carregarPerfis() {
    const container = document.getElementById('listaPerfis');
    container.innerHTML = '';
    perfis.forEach((perfil, index) => {
        const div = document.createElement('div');
        div.className = 'perfil-item';
        div.tabIndex = 0;
        div.innerHTML = `<img src="${perfil.imagem}"><p>${perfil.nome}</p>`;
        div.addEventListener('click', () => entrarNoPerfil(perfil.nome));
        div.addEventListener('keydown', (e) => { if(e.key === 'Enter') entrarNoPerfil(perfil.nome); });
        container.appendChild(div);
    });
    focarPrimeiro();
}

function entrarNoPerfil(nome) {
    alert(`✅ Entrando no perfil: ${nome}`);
    // Aqui você vai colocar o link ou código que abre sua lista de canais/stream
}

function salvarPerfil(nome, imagem) {
    perfis.push({ nome, imagem });
    localStorage.setItem('perfisTVSTREAM', JSON.stringify(perfis));
    trocarTela('tela-inicial');
    carregarPerfis();
}

function trocarTela(id) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
    setTimeout(focarPrimeiro, 100);
}

function focarPrimeiro() {
    const foco = document.querySelector('.ativa [tabindex="0"], .ativa button, .ativa input, .ativa .avatar-opcao');
    if(foco) foco.focus();
}

// Navegação pelo controle remoto
document.addEventListener('keydown', (e) => {
    const focado = document.activeElement;
    if(!focado) return;

    const indice = [...focado.parentElement.children].indexOf(focado);
    const colunas = window.innerWidth > 1000 ? 5 : window.innerWidth > 700 ? 4 : 3;

    switch(e.key) {
        case 'ArrowRight':
            const dir = focado.parentElement.children[indice + 1];
            if(dir) dir.focus();
            break;
        case 'ArrowLeft':
            const esq = focado.parentElement.children[indice - 1];
            if(esq) esq.focus();
            break;
        case 'ArrowDown':
            const baixo = focado.parentElement.children[indice + colunas];
            if(baixo) baixo.focus();
            break;
        case 'ArrowUp':
            const cima = focado.parentElement.children[indice - colunas];
            if(cima) cima.focus();
            break;
        case 'Enter':
            if(focado.classList.contains('avatar-opcao')) {
                salvarPerfil(nomeAtual, focado.src);
            }
            break;
        case 'Escape':
            voltar();
            break;
    }
    atualizarFoco();
});

function atualizarFoco() {
    document.querySelectorAll('.focado').forEach(el => el.classList.remove('focado'));
    if(document.activeElement) document.activeElement.classList.add('focado');
}

function voltar() {
    const telaAtual = document.querySelector('.tela.ativa').id;
    if(telaAtual === 'tela-nome') trocarTela('tela-inicial');
    if(telaAtual === 'tela-avatar') trocarTela('tela-nome');
}

// Ações dos botões
document.getElementById('btnNovoPerfil').onclick = () => trocarTela('tela-nome');
document.getElementById('voltarNome').onclick = () => trocarTela('tela-inicial');
document.getElementById('voltarAvatar').onclick = () => trocarTela('tela-nome');

document.getElementById('btnEscolherAvatar').onclick = () => {
    nomeAtual = document.getElementById('inputNome').value.trim();
    if(!nomeAtual) { alert('Digite um nome válido!'); return; }
    trocarTela('tela-avatar');
};

window.onload = carregarPerfis;
</script>

</body>
</html>
