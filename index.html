<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Stream Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; font-family: sans-serif; }
        /* Player limpo para controle total via JS */
        video { width: 100vw; height: 100vh; object-fit: contain; background: #000; outline: none; }
        
        /* Interface de seleção */
        #interface { position: absolute; bottom: 0; width: 100%; max-height: 40vh; background: rgba(0,0,0,0.9); overflow-y: auto; padding: 20px; transition: 0.3s; z-index: 10; }
        .grid { display: flex; flex-wrap: wrap; gap: 10px; }
        button { padding: 15px; background: #333; color: white; border: 2px solid transparent; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:focus { border-color: #ff3e3e; background: #555; outline: none; transform: scale(1.05); }
        
        /* Classe para esconder interface */
        .oculto { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <video id="video" playsinline></video>

    <div id="interface">
        <div id="btns-series" class="grid" style="margin-bottom: 20px;"></div>
        <div id="btns-eps" class="grid"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const interfaceDiv = document.getElementById('interface');
        const listaSeries = document.getElementById('btns-series');
        const listaEps = document.getElementById('btns-eps');
        let hls = new Hls();

        const series = [
            { nome: "Invencivel", pasta: "i/invencivel-4-dublado", total: 8, tipo: "zero" },
            { nome: "Ben 10", pasta: "b/ben-10-dublado", total: 52, tipo: "zero" },
            { nome: "Yomi", pasta: "y/yomi-no-tsugai", total: 12, tipo: "zero" },
            { nome: "Tintim", pasta: "a/as-aventuras-de-tintim-dublado", total: 39, tipo: "zero" },
            { nome: "Pantera", pasta: "a/a-pantera-cor-de-rosa", total: 129, tipo: "zero" },
            { nome: "One Piece", pasta: "o/one-piece", total: 1166, start: 1003, tipo: "puro" }
        ];

        series.forEach(s => {
            let b = document.createElement('button');
            b.innerText = s.nome;
            b.onclick = () => renderEps(s);
            listaSeries.appendChild(b);
        });

        function renderEps(serie) {
            listaEps.innerHTML = "";
            let inicio = serie.start || 1;
            for (let i = inicio; i <= serie.total; i++) {
                let n = (serie.tipo === 'zero' && i < 10) ? "0" + i : i;
                let btn = document.createElement('button');
                btn.innerText = i;
                btn.onclick = () => {
                    if (hls) hls.destroy();
                    hls = new Hls();
                    hls.loadSource(`https://cdn-s01.mywallpaper-4k-image.net/stream/${serie.pasta}/${n}.mp4/index.m3u8`);
                    hls.attachMedia(video);
                    video.play();
                    interfaceDiv.classList.add('oculto');
                    video.focus();
                };
                listaEps.appendChild(btn);
            }
        }

        // CAPTURA DE TECLAS "BLINDADA" (Fire Stick / Android TV)
        document.addEventListener('keydown', (e) => {
            // O 'true' no final garante que o site receba o comando ANTES do sistema
            switch(e.keyCode) {
                case 13: // Botão OK (Centro)
                    e.preventDefault();
                    if (!interfaceDiv.classList.contains('oculto')) {
                        document.activeElement.click();
                    } else {
                        video.paused ? video.play() : video.pause();
                    }
                    break;
                case 8:  // Botão Voltar (Back)
                case 27: // Escape
                    e.preventDefault();
                    e.stopPropagation();
                    if (interfaceDiv.classList.contains('oculto')) {
                        interfaceDiv.classList.remove('oculto');
                        video.pause();
                    }
                    break;
                case 37: // Seta Esquerda (Voltar 10s)
                    video.currentTime -= 10;
                    break;
                case 39: // Seta Direita (Avançar 10s)
                    video.currentTime += 10;
                    break;
            }
        }, true);
    </script>
</body>
</html>
