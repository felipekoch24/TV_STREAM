<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>TV PLAYER</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        video { width: 100vw; height: 100vh; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding: 40px; z-index: 100; display: flex; flex-direction: column; overflow-y: auto; }
        #lista { display: flex; flex-wrap: wrap; gap: 30px; padding: 20px; }
        button { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; width: 280px; height: 380px; padding: 15px; background: #111; color: #fff; border: 3px solid #333; font-size: 22px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button img { width: 250px !important; height: 250px !important; object-fit: cover; margin-bottom: 15px; border-radius: 4px; display: block; }
        .nav-btn { width: 280px !important; height: 100px !important; justify-content: center !important; }
        .nav-btn img { display: none !important; }
        #infobar { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); color: #fff; padding: 20px; display: none; z-index: 500; font-size: 20px; box-sizing: border-box; }
        #barra-progresso { width: 100%; height: 6px; background: #444; margin-bottom: 10px; cursor: pointer; }
        #progresso-atual { height: 100%; background: #ff3e3e; width: 0%; }
        #teclado-virtual { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; margin-top: 20px; }
        #teclado-virtual button { padding: 15px; font-size: 1.2em; background: #333; color: white; border: none; cursor: pointer; }
        #teclado-virtual button:focus { background: #e50914; transform: scale(1.1); }
    </style>
</head>
<body>
    <video id="video"></video>
    <div id="menu">
        <div id="barra-busca" style="padding: 10px;">
            <input type="text" id="campo-procura" placeholder="DIGITE O NOME..." oninput="filtrarSeries()">
            <div id="teclado-virtual"></div>
        </div>
        <h2 id="titulo-selecione">CONTINUAR ASSISTINDO</h2>
        <div id="lista-continuar" style="display: flex; gap: 15px; margin-bottom: 40px;"></div>
        <h2 id="titulo-todas">TODAS AS SÉRIES</h2>
        <div id="lista"></div>
    </div>
    <div id="infobar">
        <div id="barra-progresso" onclick="buscarNoVideo(event)"><div id="progresso-atual"></div></div>
        <div id="aviso-prox-container" style="display: none; text-align: center; margin-top: 20px;">
            <p>PRÓXIMO VÍDEO EM <span id="contador">10</span>s</p>
            <button onclick="pularEpisodio()">PULAR</button>
            <button onclick="cancelarPulo()">CANCELAR</button>
        </div>
        <span id="tempo">00:00 / 00:00</span>
    </div>

    <script>
        let series = [];
        const video = document.getElementById('video');
        const lista = document.getElementById('lista');
        const menu = document.getElementById('menu');
        const infobar = document.getElementById('infobar');
        let hls = new Hls();
        let serieAtual = null, tempAtual = null, timerPulo = null, episodioAtual = 0, segundosRestantes = 10;

        async function carregarSeries() {
            try {
                const res = await fetch('series1.json');
                series = await res.json();
                renderizarMenu();
                renderizarContinuarAssistindo();
            } catch (e) { console.error("Erro ao carregar JSON:", e); }
        }

        function renderizarMenu() {
            lista.innerHTML = "";
            series.forEach(s => {
                let btn = document.createElement('button');
                btn.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/250'"><span>${s.nome}</span>`;
                btn.onclick = () => renderizarEps(s);
                lista.appendChild(btn);
            });
        }

        function renderizarEps(s) {
            serieAtual = s;
            lista.innerHTML = `<h2>${s.nome}</h2>`;
            s.temporadas.forEach(temp => {
                let btn = document.createElement('button');
                btn.innerHTML = `<span>Temporada ${temp.n}</span>`;
                btn.onclick = () => mostrarEpisodiosDaTemporada(temp, s);
                lista.appendChild(btn);
            });
            let btnVoltar = document.createElement('button');
            btnVoltar.innerText = "⬅ VOLTAR";
            btnVoltar.onclick = renderizarMenu;
            lista.appendChild(btnVoltar);
        }

        function mostrarEpisodiosDaTemporada(temp, serie, pagina = 0) {
            tempAtual = temp; serieAtual = serie;
            lista.innerHTML = `<button class="nav-btn" onclick="renderizarEps(serieAtual)">⬅ VOLTAR ÀS TEMPORADAS</button>`;
            let start = temp.start || 1, totalEps = temp.total, inicio = pagina * 6, fim = Math.min(inicio + 6, totalEps);

            for (let i = inicio; i < fim; i++) {
                let epNum = start + i, epFmt = epNum.toString().padStart(2, '0');
                let url = `https://cdn-s01.mywallpaper-4k-image.net/stream/${temp.pasta}/${epFmt}.mp4/index.m3u8`;
                let btn = document.createElement('button');
                btn.innerHTML = `<img src="${serie.img}"> <span>Episódio ${epNum}</span>`;
                btn.onclick = () => tocar(url);
                lista.appendChild(btn);
            }
            if (pagina > 0) {
                let btnAnt = document.createElement('button'); btnAnt.className = 'nav-btn'; btnAnt.innerText = "⬅ ANTERIOR";
                btnAnt.onclick = () => mostrarEpisodiosDaTemporada(temp, serie, pagina - 1);
                lista.appendChild(btnAnt);
            }
            if (fim < totalEps) {
                let btnProx = document.createElement('button'); btnProx.className = 'nav-btn'; btnProx.innerText = "PRÓXIMO ➡";
                btnProx.onclick = () => mostrarEpisodiosDaTemporada(temp, serie, pagina + 1);
                lista.appendChild(btnProx);
            }
        }

        function tocar(url) {
            let match = url.match(/\/(\d+)\.mp4/);
            episodioAtual = match ? parseInt(match[1]) : 0;
            menu.style.display = 'none';
            if(hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }

        function filtrarSeries() {
            let termo = document.getElementById('campo-procura').value.toLowerCase();
            document.querySelectorAll('#lista button').forEach(btn => btn.style.display = btn.innerText.toLowerCase().includes(termo) ? 'block' : 'none');
        }

        // Funções básicas de player mantidas...
        video.ontimeupdate = () => {
            let cur = video.currentTime, dur = video.duration || 0;
            document.getElementById('progresso-atual').style.width = ((cur / dur) * 100) + "%";
            document.getElementById('tempo').innerText = formatarTempo(cur) + " / " + formatarTempo(dur);
        };

        function formatarTempo(s) { let m = Math.floor(s/60); let seg = Math.floor(s%60); return (m<10?"0"+m:m) + ":" + (seg<10?"0"+seg:seg); }
        
        function renderizarContinuarAssistindo() { /* Sua lógica original */ }
        function criarTeclado() { /* Sua lógica original */ }

        // Inicialização
        carregarSeries();
        criarTeclado();
    </script>
</body>
</html>
