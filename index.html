<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Stream - Perfis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background: linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.88)), 
                        url('https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund01.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 0.5s ease;
        }

        .tela {
            display: none;
            padding: 40px 20px;
            text-align: center;
        }

        .tela.ativa {
            display: block;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #ffffff;
        }

        h3 {
            font-size: 22px;
            margin: 30px 0 20px;
            color: #dddddd;
        }

        .voltar {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .voltar:hover {
            background: rgba(255,255,255,0.3);
        }

        .grid-avatares, .grid-fundos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .avatar-opcao, .fundo-opcao {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #222;
        }

        .avatar-opcao:hover, .fundo-opcao:hover {
            transform: scale(1.08);
            border-color: #4a90e2;
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.5);
        }

        .formulario {
            max-width: 400px;
            margin: 80px auto 0;
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 12px;
        }

        .formulario input {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
        }

        .formulario button {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .formulario button:hover {
            background: #357abd;
        }
    </style>
</head>
<body>

<!-- 📋 Tela inicial / Formulário -->
<div id="tela-formulario" class="tela ativa">
    <div class="formulario">
        <h2>Criar Perfil</h2>
        <input type="text" id="nomePerfil" placeholder="Digite seu nome" required>
        <button onclick="irParaEscolherAvatar()">Escolher Imagem</button>
    </div>
</div>

<!-- 🎭 Tela: Escolher Avatar -->
<div id="tela-escolha-avatar" class="tela">
    <button class="voltar" onclick="voltarParaFormulario()">← Voltar</button>
    <h2>Escolha sua Imagem de Perfil</h2>

    <div class="categoria">
        <h3>Masculino</h3>
        <div class="grid-avatares">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc01.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc02.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc03.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc04.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc05.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc06.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc07.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc08.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc09.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc10.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc11.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc12.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc13.jpg" onclick="selecionarAvatar(this.src)">
        </div>
    </div>

    <div class="categoria">
        <h3>Feminino</h3>
        <div class="grid-avatares">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin01.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin02.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin03.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin04.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin05.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin06.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin07.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin08.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin09.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin10.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin11.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin12.jpg" onclick="selecionarAvatar(this.src)">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin13.jpg" onclick="selecionarAvatar(this.src)">
        </div>
    </div>
</div>

<!-- 🖼️ Tela: Escolher Fundo -->
<div id="tela-escolha-fundo" class="tela">
    <button class="voltar" onclick="voltarParaAvatar()">← Voltar</button>
    <h2>Escolha o Fundo</h2>
    <div class="categoria">
        <div class="grid-fundos">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund01.jpg" onclick="selecionarFundo(this.src)">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund02.jpg" onclick="selecionarFundo(this.src)">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund03.jpg" onclick="selecionarFundo(this.src)">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund04.jpg" onclick="selecionarFundo(this.src)">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund05.jpg" onclick="selecionarFundo(this.src)">
        </div>
    </div>
</div>

<script>
    let avatarSelecionado = '';
    let nomeDigitado = '';

    function irParaEscolherAvatar() {
        nomeDigitado = document.getElementById('nomePerfil').value.trim();
        if (!nomeDigitado) {
            alert('Digite um nome primeiro!');
            return;
        }
        trocarTela('tela-escolha-avatar');
    }

    function selecionarAvatar(caminho) {
        avatarSelecionado = caminho;
        trocarTela('tela-escolha-fundo');
    }

    function selecionarFundo(caminho) {
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.88)), url('${caminho}')`;
        alert(`Perfil criado!\nNome: ${nomeDigitado}\nImagem salva ✅`);
        voltarParaFormulario();
    }

    function trocarTela(idTela) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById(idTela).classList.add('ativa');
    }

    function voltarParaFormulario() {
        trocarTela('tela-formulario');
    }

    function voltarParaAvatar() {
        trocarTela('tela-escolha-avatar');
    }
</script>

</body>
</html>
