<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>TV PLAYER</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
   <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
    video { width: 100vw; height: 100vh; }

    #menu { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: #000; padding: 40px; z-index: 100; 
        display: flex; flex-direction: column; overflow-y: auto;
    }

    #lista { display: flex; flex-wrap: wrap; gap: 30px; padding: 20px; }

    /* Botão Padrão (Episódios) */
    button { 
        display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        width: 280px; height: 380px; padding: 15px; background: #111; color: #fff; 
        border: 3px solid #333; font-size: 22px; font-weight: bold; cursor: pointer; transition: transform 0.2s;
    }

    button img { 
        width: 250px !important; height: 250px !important; object-fit: cover; 
        margin-bottom: 15px; border-radius: 4px; display: block;
    }
/* VOLTAR VIDEO BOTÃO */
#btn-voltar-video {
    position: absolute; top: 20px; right: 20px;
    z-index: 600; padding: 10px 20px;
    background: rgba(0, 0, 0, 0.6); color: white;
    border: 2px solid white; border-radius: 5px;
    cursor: pointer; display: none; /* Começa escondido */
pointer-events: auto; /* Garante que o mouse/controle consiga clicar */}
#btn-voltar-video:focus { background: white; color: black; }

    /* ESTILO ESPECIAL PARA BOTÕES DE NAVEGAÇÃO (Voltar, Anterior, Próximo) */
    .nav-btn { width: 280px !important; height: 100px !important; justify-content: center !important; }
    .nav-btn img { display: none !important; }
/* MOSTRAR TEMPO, ALGO ASSIM */
#infobar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    color: #fff;
    padding: 20px;
    display: none; /* Inicia escondido */
    z-index: 500;
    font-size: 20px;
    box-sizing: border-box;
}

/* Barra de progresso estilo MX */
#barra-progresso {
    width: 100%;
    height: 6px;
    background: #444;
    margin-bottom: 10px;
    cursor: pointer;
}
/* PROGRESSO ATUAL */
#progresso-atual {
    height: 100%;
    background: #ff3e3e; /* Cor do seu tema */
    width: 0%;
}
      /* Container que vai organizar as teclas em grade */
#teclado-virtual {
    display: grid;
    grid-template-columns: repeat(9, 1fr); /* 9 colunas fica ótimo na TV */
    gap: 10px;
    margin-top: 20px;
}
}
/* TECLADO VIRTUAL */
#teclado-virtual button {
    padding: 15px;
    font-size: 1.2em;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
}

#teclado-virtual button:focus {
    background: #e50914; /* Cor de destaque (vermelho Netflix) quando focado */
    transform: scale(1.1); /* Dá um efeito de "crescer" no controle remoto */
}
</style>
</head>
<body>

    <video id="video"></video>
// ORGANIZADOR DE LAYOUT DO MENU//
<div id="menu">
    <div id="barra-busca" style="padding: 10px;">
        <input type="text" id="campo-procura" placeholder="DIGITE O NOME..." oninput="filtrarSeries()">
        <div id="teclado-virtual"></div> 
    </div>

    <h2 id="titulo-selecione">SELECIONE A SÉRIE</h2>
    
    <h2 id="titulo-continuar">CONTINUAR ASSISTINDO</h2>
    <div id="lista-continuar" style="display: flex; gap: 15px; margin-bottom: 40px;"></div>

    <h2 id="titulo-todas">TODAS AS SÉRIES</h2>
    <div id="lista"></div>
</div>

<div id="infobar">
    <div id="barra-progresso" onclick="buscarNoVideo(event)">
        <div id="progresso-atual"></div>
    </div>
    
    <div id="aviso-prox-container" style="display: none; text-align: center; margin-top: 20px;">
        <p style="font-size: 18px; margin-bottom: 10px;">PRÓXIMO VÍDEO EM <span id="contador">10</span>s</p>
        <button id="btn-pular" onclick="pularEpisodio()" style="padding: 10px 20px; cursor: pointer;">PULAR</button>
        <button id="btn-cancelar" onclick="cancelarPulo()" style="padding: 10px 20px; cursor: pointer;">CANCELAR</button>
    </div>
    
    <span id="tempo">00:00 / 00:00</span>
</div>
    <script>
      // ============================================
// CONFIGURAÇÃO DOS DADOS (JSON EXTERNO)
// ============================================
let series = []; // Começa vazio, vai ser preenchido pelo JSON

async function carregarSeries() {
    try {
        // O "fetch" vai buscar o arquivo que você subiu no GitHub
        const resposta = await fetch('série.json'); 
        series = await resposta.json();
        
        console.log("Séries carregadas com sucesso!");
        renderizarMenu(); // Só desenha o menu depois que os dados chegarem
    } catch (erro) {
        console.error("Erro ao carregar o JSON:", erro);
        // Aqui você pode colocar um aviso visual se o arquivo não carregar
    }
}
        // ============================================
// VARIÁVEIS DO PLAYER
// ============================================
const video = document.getElementById('video');
const lista = document.getElementById('lista');
const menu = document.getElementById('menu');
const infobar = document.getElementById('infobar');
let hls = new Hls();
let serieAtual = null;

// VARIÁVEIS DE PAGINAÇÃO
let paginaAtual = 0;
let listaEps = [];

// ============================================
// INICIALIZAÇÃO
// ============================================
carregarSeries(); // Chama a função para buscar o JSON ao abrir
//VOLTAR PARA MENU
function voltarParaMenu() {
    video.pause();
    document.getElementById('infobar').style.display = 'none';
    document.getElementById('btn-voltar-video').style.display = 'none';
    menu.style.display = 'flex';
}
// RENDERIZAR MENU
        function renderizarMenu() {
            lista.innerHTML = ""; 
            series.forEach(s => {
                let btn = document.createElement('button');
                let img = document.createElement('img');
                img.src = s.imagem;
                let span = document.createElement('span');
                span.innerText = s.nome;
                btn.appendChild(img);
                btn.appendChild(span);
                btn.onclick = () => renderizarEps(s);
                lista.appendChild(btn);
            });
            lista.querySelector('button').focus();
        }

// FUNÇÃO RENDERIZAR EPS
function renderizarEps(s) {
    serieAtual = s; 
    listaEps = [];
    
    // Preenche a lista com os episódios disponíveis baseados no JSON
    for (let i = 1; i <= s.total; i++) {
        listaEps.push(i);
    }

    // Pega o tempo salvo do localStorage (se existir)
    // Usamos '|| 0' para garantir que, se não existir, ele comece em 0
    let tempoSalvo = localStorage.getItem('progresso_' + s.nome) || 0;
    let duracaoTotal = 3600; // Aqui você precisaria salvar a duração real, ou definir um padrão

    let porcentagemAssistida = (tempoSalvo / duracaoTotal) * 100;

    // Se quiser mostrar o botão de continuar, aqui seria o lugar de injetar no HTML
    
    paginaAtual = 0;
    mostrarPagina(s);
}
// MOSTRAR PAGINA
function mostrarPagina(s) {
    lista.innerHTML = '';
    
    // Botão VOLTAR
    let btnVoltar = document.createElement('button');
    btnVoltar.className = 'nav-btn';
    btnVoltar.innerText = "⬅ VOLTAR AO MENU";
    btnVoltar.onclick = () => renderizarMenu();
    lista.appendChild(btnVoltar);
    // MUDAR NÚMERO DA PAGINAÇÃO, NOS 3 IGUAIS
    let inicio = paginaAtual * 6;
    let fim = inicio + 6;
    let paginacao = listaEps.slice(inicio, fim);
// AQUI O NUMERO TAMBÉM TEM QUE SER IGUAL ALI EM CIMA//
    paginacao.forEach(i => {
        // Dentro do seu paginacao.forEach(i => { ...
// Isso garante que se o episódio for 5, vira 05. Se for 120, continua 120.
let numeroEp = i.toString().padStart(2, '0'); 
let url = `https://cdn-s01.mywallpaper-4k-image.net/stream/${s.pasta}/${numeroEp}.mp4/index.m3u8`;
        let btn = document.createElement('button');
        btn.innerHTML = `<img src="${s.imagem}"> <span>Episódio ${i}</span>`;
        btn.onclick = () => tocar(url);
        lista.appendChild(btn);
    });
// FUNÇÃO FILTRAR SÉRIES PRA ABA PESQUISAR
function filtrarSeries() {
    let termo = document.getElementById('campo-procura').value.toLowerCase();
    let botoes = document.querySelectorAll('#menu button'); // Seus botões de série
    
    //VERIFICADOR
    botoes.forEach(btn => {
        // Verifica se o texto do botão contém o que você digitou
        if (btn.innerText.toLowerCase().includes(termo)) {
            btn.style.display = 'block';
        } else {
            btn.style.display = 'none';
        }
    });
}

    // Botões de Navegação (Anterior/Próximo)
    if (paginaAtual > 0) {
        let b = document.createElement('button');
        b.className = 'nav-btn';
        b.innerText = "⬅ ANTERIOR";
        b.onclick = () => { paginaAtual--; mostrarPagina(s); };
        lista.appendChild(b);
    }
    if (fim < listaEps.length) {
        let b = document.createElement('button');
        b.className = 'nav-btn';
        b.innerText = "PRÓXIMO ➡";
        b.onclick = () => { paginaAtual++; mostrarPagina(s); };
        lista.appendChild(b);
    }
    lista.querySelector('button').focus();
}        
//FUNÇÃO TOCAR
function tocar(url) {
    // Extrai o número do arquivo de forma segura
    let match = url.match(/\/(\d+)\.mp4/);
    episodioAtual = match ? parseInt(match[1]) : 0;

    // Limpa a tela e o player antigo
    menu.style.display = 'none';
    if(hls) hls.destroy();

    // Inicia o novo vídeo
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
}
// MOSTRAR CONTADOR PLAY
function mostrarContador() {
    document.getElementById('aviso-prox-container').style.display = 'block';
    infobar.style.display = 'block'; // Garante que o infobar apareça
    
    timerPulo = setInterval(() => {
        segundosRestantes--;
        document.getElementById('contador').innerText = segundosRestantes;
        
        if (segundosRestantes <= 0) {
            pularEpisodio();
        }
    }, 1000);
}
//PULAR EPISÓDIO PLAY
function pularEpisodio() {
    clearInterval(timerPulo);
    let indexAtual = listaEps.indexOf(episodioAtual); // Você precisa salvar qual o ep atual
    if (indexAtual < listaEps.length - 1) {
        let proximoEp = listaEps[indexAtual + 1];
        // Gere a URL e chame tocar() aqui
    }
}
//CANCELAR PULO PLAY
function cancelarPulo() {
    clearInterval(timerPulo);
    document.getElementById('aviso-prox-container').style.display = 'none';
    timerPulo = null;
    segundosRestantes = 10;
}
// Este bloco cuida de MOSTRAR O TEMPO NA TELA , VIDEO.ONTIME
            let timerPulo = null;
let segundosRestantes = 10;
video.ontimeupdate = () => {
    let tempoElemento = document.getElementById('tempo');
    let progresso = document.getElementById('progresso-atual');
    
    let cur = video.currentTime;
    let dur = video.duration || 0;
    
    // Atualiza o texto
    tempoElemento.innerText = formatarTempo(cur) + " / " + formatarTempo(dur);
    let tempoRestante = dur - cur;
    
    // Se faltam 10 segundos para acabar e o timer ainda não rodou
    if (tempoRestante <= 10 && tempoRestante > 0 && !timerPulo) {
        mostrarContador();
    }
    
    // Atualiza a barrinha
    let porcentagem = (cur / dur) * 100;
    progresso.style.width = porcentagem + "%";

    // Salva o progresso no localStorage
    // (Note que agora está DENTRO do evento, não solto no script)
    if (serieAtual) {
    localStorage.setItem('progresso_' + video.currentSrc, cur);
    localStorage.setItem('duracao_' + video.currentSrc, dur); // SALVE A DURAÇÃO AQUI!
    localStorage.setItem('img_' + video.currentSrc, serieAtual.imagem);
    localStorage.setItem('nome_' + video.currentSrc, serieAtual.nome);
}
};

// Função para clicar na barra e pular o vídeo (estilo MX)
function buscarNoVideo(e) {
    let barra = document.getElementById('barra-progresso');
    let clickX = e.offsetX;
    let larguraTotal = barra.offsetWidth;
    let novaPosicao = (clickX / larguraTotal) * video.duration;
    video.currentTime = novaPosicao;
}
// Função auxiliar para deixar o TEMPO BONITO (00:00)
function formatarTempo(segundos) {
    let min = Math.floor(segundos / 60);
    let seg = segundos % 60;
    return (min < 10 ? "0" + min : min) + ":" + (seg < 10 ? "0" + seg : seg);
}

// COMANDOS DO CONTROLE E TECLADO
document.addEventListener('keydown', (e) => {
    // 1. Pegamos todos os botões visíveis dentro da lista
    const botoes = Array.from(document.querySelectorAll('#lista button'));
    const index = botoes.indexOf(document.activeElement);

    // 2. Se o MENU estiver ABERTO:
    if (menu.style.display !== 'none') {
        // SETA DIREITA : PROXIMO EPISODIO NA PAGINAÇÃO, IR PRA FRENTE
        if (e.keyCode === 39 && index < botoes.length - 1) {
            e.preventDefault();
            botoes[index + 1].focus();
        }
        // SETA ESQUERDA: EPISÓDIO ANTERIOR NA PAGINAÇÃO, IR PRA TRÁS
        if (e.keyCode === 37 && index > 0) {
            e.preventDefault();
            botoes[index - 1].focus();
        }
        
        // Enter no menu: executa a função do botão (clica nele)
        if (e.keyCode === 13) {
            e.preventDefault();
            document.activeElement.click(); 
        }
    } 
    // 3. Se o VÍDEO estiver rodando (MENU ESCONDIDO:
    else {
        // Setas para avançar/retroceder 10 segundos
        if (e.keyCode === 37) { e.preventDefault(); video.currentTime -= 10; } // REGRIDE SETA ESQUERDA
        if (e.keyCode === 39) { e.preventDefault(); video.currentTime += 10; } // AVANÇA SETA DIREITA
        
        // SETA PARA BAIXO: Volta para o menu (Invisível e limpo)
    if (e.keyCode === 40) { // SETA PRA BAIXO
        e.preventDefault();
        video.pause();
        infobar.style.display = 'none';
        menu.style.display = 'flex';
        lista.querySelector('button').focus(); // Foca no primeiro botão do menu
    }
    
    // Enter no vídeo: PLAY/PAUSE e mostra/esconde o tempo
    if (e.keyCode === 13) {
        e.preventDefault();
        if (video.paused) { 
            video.play(); 
            infobar.style.display = 'none'; 
        } else { 
            video.pause(); 
            infobar.style.display = 'block'; 
        }
    }
       
    
        // Tecla 8 (Back): volta para o menu
        if (e.keyCode === 8) { 
            e.preventDefault();
            menu.style.display = 'flex'; 
            infobar.style.display = 'none'; 
            video.pause(); 
        }
    }
});
       //CONTINUAR ASSISTINDO
       function renderizarContinuarAssistindo() {
    const listaContinuar = document.getElementById('lista-continuar');
    listaContinuar.innerHTML = ""; 

    for (let i = 0; i < localStorage.length; i++) {
        let chave = localStorage.key(i);
        
        if (chave.startsWith('progresso_')) {
            let url = chave.replace('progresso_', '');
            let tempo = parseFloat(localStorage.getItem(chave));
            let duracao = parseFloat(localStorage.getItem('duracao_' + url)) || 1; // Pega do storage
            let img = localStorage.getItem('img_' + url);
            let nome = localStorage.getItem('nome_' + url);

            // A trava dos 90% (0.9)
            if (tempo > 10 && (tempo / duracao) < 0.9) {
                let btn = document.createElement('button');
                btn.innerHTML = `<img src="${img}" style="width: 80px; height: 80px; object-fit: cover;"> <span>${nome}</span>`;
                
                btn.onclick = () => {
                    tocar(url);
                    // Damos um tempo para o HLS carregar o vídeo antes de pular para o tempo
                    setTimeout(() => { video.currentTime = tempo; }, 1000);
                };
                listaContinuar.appendChild(btn);
            }
        }
    }
}
    //FUNÇÃO ADICIONAR LETRA
    function addLetra(letra) {
    let input = document.getElementById('campo-procura');
    input.value += letra;
    filtrarSeries(); // Isso já filtra na hora que clica
}
//FUNÇÃO APAGAR LETRAS
function apagarLetra() {
    let input = document.getElementById('campo-procura');
    input.value = input.value.slice(0, -1);
    filtrarSeries();
}
// ESSA FUNÇÃO CHAMA E CRIA O TECLADO ESTILO YOUCINE
    function criarTeclado() {
    const container = document.getElementById('teclado-virtual');
    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ⌫"; // Aqui você tem todas!
    
    letras.split('').forEach(l => {
        let btn = document.createElement('button');
        btn.innerText = l;
        btn.onclick = () => {
            if (l === '⌫') apagarLetra();
            else addLetra(l);
        };
        container.appendChild(btn);
    });

// Chame essa função quando carregar o menu
criarTeclado();
// RENDERIZAR MENU
        renderizarMenu();
        // Adicione esta linha:
    renderizarContinuarAssistindo(); 
}
    </script>
</body>
</html>
