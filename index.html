<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Stream Privado - Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background-color: #080808; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; text-align: center; }
        video { width: 100%; height: 50vh; background-color: #000; border: 3px solid #1a1a1a; }
        .carrossel { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; width: 100%; }
        .btn-serie { background-color: #161616; border: 2px solid #333; padding: 15px; color: #fff; border-radius: 6px; cursor: pointer; min-width: 150px; }
        .btn-ep { background-color: #222; border: 1px solid #444; padding: 10px; color: #fff; cursor: pointer; min-width: 60px; }
        .btn-serie:focus { background-color: #ff3e3e; }
        .btn-ep:focus { background-color: #00bcd4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 Painel Privado</h1>
        <video id="video" controls autoplay></video>
        <div class="carrossel" id="linha-series">
            <button class="btn-serie" onclick="carregar('Invencivel', 'i/invencivel-4-dublado', 1, 8, 'zero', this)">🦸 Invencível</button>
            <button class="btn-serie" onclick="carregar('Ben 10', 'b/ben-10-dublado', 1, 52, 'zero', this)">👽 Ben 10</button>
            <button class="btn-serie" onclick="carregar('Yomi', 'y/yomi-no-tsugai', 1, 12, 'zero', this)">💥 Yomi</button>
            <button class="btn-serie" onclick="carregar('Tintim', 'a/as-aventuras-de-tintim-dublado', 1, 39, 'zero', this)">🚀 Tintim</button>
            <button class="btn-serie" onclick="carregar('Pantera', 'a/a-pantera-cor-de-rosa', 1, 129, 'zero', this)">🎬 Pantera</button>
            <button class="btn-serie" onclick="carregar('One Piece', 'o/one-piece', 1003, 1166, 'puro', this)">🏴‍☠️ One Piece</button>
        </div>
        <div class="carrossel" id="linha-episodios"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const listaEps = document.getElementById('linha-episodios');
        let hls;

        function carregar(nome, pasta, inicio, fim, formato, el) {
            listaEps.innerHTML = "";
            for (let i = inicio; i <= fim; i++) {
                // Formatação inteligente
                let n = (formato === 'zero' && i < 10) ? "0" + i : i;
                
                let url = `https://cdn-s01.mywallpaper-4k-image.net/stream/${pasta}/${n}.mp4/index.m3u8`;
                
                let btn = document.createElement('button');
                btn.className = 'btn-ep';
                btn.innerText = i;
                btn.onclick = () => tocar(url);
                listaEps.appendChild(btn);
            }
        }

        function tocar(url) {
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            video.play();
        }
    </script>
</body>
</html>
