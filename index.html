<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TV STREAM</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund01.jpg');
            background-size: cover;
            background-position: center;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        .tela { display: none; width: 100vw; height: 100vh; padding: 40px; }
        .tela.ativa { display: block; }

        h1, h2 { text-align: center; margin-bottom: 40px; font-size: 36px; }
        h3 { font-size: 26px; margin: 30px 0 20px; text-align: center; color: #ffcc00; }

        .voltar {
            position: absolute; top: 30px; left: 30px;
            padding: 15px 30px; font-size: 24px;
            background: rgba(255,255,255,0.2); border: none; border-radius: 8px;
            color: white; cursor: pointer; outline: none;
        }

        .focado {
            border: 4px solid #0099ff !important;
            box-shadow: 0 0 20px #0099ff;
            transform: scale(1.05);
            transition: all 0.2s ease;
        }

        .lista-perfis {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px; max-width: 1200px; margin: 0 auto; justify-items: center;
        }

        .perfil-item {
            text-align: center; padding: 15px; border-radius: 12px;
            background: rgba(255,255,255,0.1); width: 220px;
            cursor: pointer; outline: none; border: 3px solid transparent;
        }

        .perfil-item img {
            width: 160px; height: 160px; border-radius: 50%;
            object-fit: cover; margin-bottom: 15px; border: none;
        }

        .perfil-item p { font-size: 26px; font-weight: bold; }

        .botao {
            padding: 20px 40px; font-size: 28px;
            background: #0099ff; border: none; border-radius: 10px;
            color: white; cursor: pointer; outline: none;
        }

        .form-container {
            max-width: 600px; margin: 80px auto;
            background: rgba(0,0,0,0.7); padding: 40px; border-radius: 12px;
        }

        input {
            width: 100%; padding: 20px; font-size: 28px;
            margin: 20px 0; border: none; border-radius: 8px; outline: none;
        }

        .grade-avatares, .grade-fundos {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 25px; max-width: 1100px; margin: 0 auto; justify-items: center;
        }

        .avatar-opcao {
            width: 120px; height: 120px; border-radius: 50%;
            object-fit: cover; cursor: pointer; border: 3px solid transparent;
            outline: none; background: #222;
        }

        .fundo-opcao {
            width: 160px; height: 100px; border-radius: 8px;
            object-fit: cover; cursor: pointer; border: 3px solid transparent;
            outline: none; background: #222;
        }

        /* Tela Player com Capas */
        #tela-player { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999; }
        #video { width: 100%; height: 100%; object-fit: contain; }
        #menu-animes {
            position: absolute; top: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.85); padding: 25px; border-radius: 12px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px; z-index: 100;
            max-height: 90vh; overflow-y: auto;
        }
        .anime-card {
            background: #1a1a1a; border-radius: 10px; padding: 12px;
            text-align: center; cursor: pointer; outline: none;
            border: 3px solid transparent;
            transition: transform 0.2s;
        }
        .anime-card img {
            width: 100%; height: 280px; object-fit: cover;
            border-radius: 6px; margin-bottom: 12px;
        }
        .anime-card h4 {
            font-size: 18px; color: #fff;
            line-height: 1.3;
        }
        .voltar-menu {
            grid-column: 1 / -1;
            padding: 15px; font-size: 22px;
            background: #222; border: none; border-radius: 8px;
            color: white; cursor: pointer; outline: none;
        }
    </style>
</head>
<body>

<!-- 📺 Tela Inicial Perfis -->
<div id="tela-inicial" class="tela ativa">
    <h1>TV STREAM</h1>
    <h2>Quem está assistindo?</h2>
    <div class="lista-perfis" id="listaPerfis"></div>
    <div style="text-align: center; margin-top: 40px;">
        <button class="botao" id="btnNovoPerfil" tabindex="0">+ Novo Perfil</button>
    </div>
</div>

<!-- 📝 Nome do Perfil -->
<div id="tela-nome" class="tela">
    <button class="voltar" id="voltarNome" tabindex="0">← Voltar</button>
    <h2>Criar Novo Perfil</h2>
    <div class="form-container">
        <label style="font-size: 28px;">Digite seu nome:</label>
        <input type="text" id="inputNome" placeholder="Ex: Felipe" tabindex="0">
        <br>
        <button class="botao" id="btnEscolherAvatar" tabindex="0" style="width:100%; margin-top:20px;">Escolher Imagem</button>
    </div>
</div>

<!-- 🎭 Escolher Avatar -->
<div id="tela-avatar" class="tela">
    <button class="voltar" id="voltarAvatar" tabindex="0">← Voltar</button>
    <h2>Escolha sua Imagem</h2>
    <div class="categoria">
        <h3>Masculino</h3>
        <div class="grade-avatares">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc01.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc02.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc03.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc04.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc05.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc06.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc07.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc08.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc09.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc10.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc11.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc12.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc13.jpg" tabindex="0">
        </div>
    </div>
    <div class="categoria">
        <h3>Feminino</h3>
        <div class="grade-avatares">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin01.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin02.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin03.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin04.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin05.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin06.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin07.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin08.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin09.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin10.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin11.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin12.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin13.jpg" tabindex="0">
        </div>
    </div>
</div>

<!-- 🖼️ Escolher Fundo -->
<div id="tela-fundo" class="tela">
    <button class="voltar" id="voltarFundo" tabindex="0">← Voltar</button>
    <h2>Escolha o Fundo</h2>
    <div class="categoria">
        <div class="grade-fundos">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund01.jpg" tabindex="0">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund02.jpg" tabindex="0">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund03.jpg" tabindex="0">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund04.jpg" tabindex="0">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund05.jpg" tabindex="0">
        </div>
    </div>
</div>

<!-- 🎬 Tela Player com Capas -->
<div id="tela-player" class="tela">
    <video id="video" controls playsinline></video>
    <div id="menu-animes">
        <h2 style="grid-column: 1 / -1; margin:0 0 20px 0; text-align:center;">📺 Catálogo</h2>

        <!-- Herói do Escudo -->
        <div class="anime-card" onclick="tocarVideo('heroi')" tabindex="0">
            <img src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/capas/heroidescudot2.jpeg" alt="Herói do Escudo">
            <h4>Herói do Escudo<br>Temporada 2</h4>
        </div>

        <!-- Jujutsu Kaisen T3 -->
        <div class="anime-card" onclick="tocarVideo('jujutsu')" tabindex="0">
            <img src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/capas/jujutsu-t3.webp" alt="Jujutsu Kaisen T3">
            <h4>Jujutsu Kaisen<br>T3 - Episódio 3</h4>
        </div>

        <!-- Street Fighter II V -->
        <div class="anime-card" onclick="tocarVideo('streetfighter')" tabindex="0">
            <img src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/capas/streetfighterv.jpeg" alt="Street Fighter II V">
            <h4>Street Fighter II V<br>Episódio 19</h4>
        </div>

        <button class="voltar-menu" onclick="fecharPlayer()" tabindex="0">⬅ Voltar ao Menu Principal</button>
    </div>
</div>

<script>
let perfis = JSON.parse(localStorage.getItem('perfisTVSTREAM')) || [];
let nomeAtual = '', avatarAtual = '', fundoAtual = '';
let hls = null;
const video = document.getElementById('video');

// 📋 Links corretos
const LINKS = {
    heroi: "", // Adicione aqui quando subir o arquivo
    jujutsu: "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/jujutsu-t3/Assistir%20Jujutsu%20Kaisen%203%20T3%20Ep3.m3u8",
    streetfighter: "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/streetfighterv/%5BAnimeFire.io%5D%20Street%20Fighter%20II%20V%20(Dublado)%20-%20Epis%C3%B3dio%2019%20(SD).m3u8"
};

// --------------------
// Perfis
// --------------------
function carregarPerfis() {
    const container = document.getElementById('listaPerfis');
    container.innerHTML = '';
    perfis.forEach(perfil => {
        const div = document.createElement('div');
        div.className = 'perfil-item';
        div.tabIndex = 0;
        div.innerHTML = `<img src="${perfil.avatar}"><p>${perfil.nome}</p>`;
        div.onclick = () => entrarNoPerfil(perfil);
        div.onkeydown = e => e.key === 'Enter' && entrarNoPerfil(perfil);
        container.appendChild(div);
    });
    focarPrimeiro();
}

function entrarNoPerfil(perfil) {
    document.body.style.background = `linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('${perfil.fundo}')`;
    trocarTela('tela-player');
}

function salvarPerfil(nome, avatar, fundo) {
    perfis.push({ nome, avatar, fundo });
    localStorage.setItem('perfisTVSTREAM', JSON.stringify(perfis));
    trocarTela('tela-inicial');
    carregarPerfis();
}

function trocarTela(id) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
    setTimeout(focarPrimeiro, 50);
}

function focarPrimeiro() {
    const primeiro = document.querySelector('.ativa [tabindex="0"]');
    if (primeiro) primeiro.focus();
}

function atualizarFoco() {
    document.querySelectorAll('.focado').forEach(el => el.classList.remove('focado'));
    if (document.activeElement?.hasAttribute('tabindex')) document.activeElement.classList.add('focado');
}

// --------------------
// Player de Vídeo
// --------------------
function tocarVideo(tipo) {
    const url = LINKS[tipo];
    if (!url) return alert('Arquivo ainda não disponível — adicione o episódio primeiro!');

    if (hls) { hls.destroy(); hls = null; }

    if (Hls.isSupported()) {
        hls = new Hls({
            enableWorker: true,
            manifestLoadingMaxRetry: 15,
            fragLoadingMaxRetry: 25,
            maxBufferSize: 200 * 1024 * 1024
        });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.log("Autoplay:", e)));
        hls.on(Hls.Events.ERROR, (_, d) => d.fatal && setTimeout(() => hls?.startLoad(), 1500));
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play().catch(e => console.log("Reprodução:", e));
    } else {
        alert('Formato não suportado no seu dispositivo!');
    }
}

function fecharPlayer() {
    if (hls) { hls.destroy(); hls = null; }
    video.pause(); video.src = "";
    trocarTela('tela-inicial');
}

// --------------------
// Navegação Setas + Mouse
// --------------------
document.addEventListener('keydown', e => {
    const focado = document.activeElement;
    if (!focado?.hasAttribute('tabindex')) return;
    const itens = Array.from(focado.parentElement.querySelectorAll('[tabindex="0"]'));
    const idx = itens.indexOf(focado);
    const colunas = window.innerWidth > 1000 ? 5 : window.innerWidth > 700 ? 4 : 3;

    switch (e.key) {
        case 'ArrowRight': if (idx + 1 < itens.length) itens[idx + 1].focus(); break;
        case 'ArrowLeft': if (idx - 1 >= 0) itens[idx - 1].focus(); break;
        case 'ArrowDown': if (idx + colunas < itens.length) itens[idx + colunas].focus(); break;
        case 'ArrowUp': if (idx - colunas >= 0) itens[idx - colunas].focus(); break;
        case 'Enter':
            e.preventDefault();
            if (focado.classList.contains('avatar-opcao')) { avatarAtual = focado.src; trocarTela('tela-fundo'); }
            else if (focado.classList.contains('fundo-opcao')) { salvarPerfil(nomeAtual, avatarAtual, focado.src); }
            else if (focado.id === 'btnNovoPerfil') { trocarTela('tela-nome'); }
            else if (focado.id === 'btnEscolherAvatar') {
                nomeAtual = document.getElementById('inputNome').value.trim();
                if (!nomeAtual) return alert('Digite um nome!');
                trocarTela('tela-avatar');
            }
            else if (focado.classList.contains('voltar') || focado.classList.contains('voltar-menu')) voltarTela();
            else if (focado.classList.contains('perfil-item')) {
                const p = perfis.find(x => x.nome === focado.querySelector('p').textContent);
                if (p) entrarNoPerfil(p);
            }
            else if (focado.classList.contains('anime-card')) focado.click();
            break;
        case 'Escape': voltarTela(); break;
    }
    atualizarFoco();
});

document.addEventListener('click', e => {
    if (e.target.classList.contains('avatar-opcao')) { avatarAtual = e.target.src; trocarTela('tela-fundo'); }
    if (e.target.classList.contains('fundo-opcao') && nomeAtual && avatarAtual) salvarPerfil(nomeAtual, avatarAtual, e.target.src);
    atualizarFoco();
});

function voltarTela() {
    const tela = document.querySelector('.tela.ativa').id;
    if (tela === 'tela-nome') trocarTela('tela-inicial');
    if (tela === 'tela-avatar') trocarTela('tela-nome');
    if (tela === 'tela-fundo') trocarTela('tela-avatar');
    if (tela === 'tela-player') fecharPlayer();
}

document.getElementById('voltarNome').onclick = () => trocarTela('tela-inicial');
document.getElementById('voltarAvatar').onclick = () => trocarTela('tela-nome');
document.getElementById('voltarFundo').onclick = () => trocarTela('tela-avatar');
document.getElementById('btnNovoPerfil').onclick = () => trocarTela('tela-nome');
document.getElementById('btnEscolherAvatar').onclick = () => {
    nomeAtual = document.getElementById('inputNome').value.trim();
    if (!nomeAtual) return alert('Digite um nome válido!');
    trocarTela('tela-avatar');
};

window.onload = carregarPerfis;
</script>

</body>
</html>
