<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>TV Stream Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        video { width: 100vw; height: 100vh; object-fit: contain; }
        
        /* Lista vertical para caber tudo */
        #interface { position: absolute; bottom: 0; width: 100%; max-height: 40vh; background: rgba(0,0,0,0.9); overflow-y: auto; padding: 20px; transition: 0.3s; }
        .grid { display: flex; flex-wrap: wrap; gap: 10px; }
        button { padding: 15px; background: #333; color: white; border: none; cursor: pointer; }
        button:focus { background: #ff3e3e; outline: none; }
        .oculto { transform: translateY(100%); }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div id="interface">
        <div id="btns-series" class="grid"></div>
        <div id="btns-eps" class="grid" style="margin-top:20px"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const interfaceDiv = document.getElementById('interface');
        const listaSeries = document.getElementById('btns-series');
        const listaEps = document.getElementById('btns-eps');
        let hls = new Hls();

        const series = [
            { nome: "Invencivel", pasta: "i/invencivel-4-dublado", total: 8, tipo: "zero" },
            { nome: "Ben 10", pasta: "b/ben-10-dublado", total: 52, tipo: "zero" },
            { nome: "Yomi", pasta: "y/yomi-no-tsugai", total: 12, tipo: "zero" },
            { nome: "Tintim", pasta: "a/as-aventuras-de-tintim-dublado", total: 39, tipo: "zero" },
            { nome: "Pantera", pasta: "a/a-pantera-cor-de-rosa", total: 129, tipo: "zero" },
            { nome: "One Piece", pasta: "o/one-piece", total: 1166, start: 1003, tipo: "puro" }
        ];

        series.forEach(s => {
            let b = document.createElement('button');
            b.innerText = s.nome;
            b.onclick = () => renderEps(s);
            listaSeries.appendChild(b);
        });

        function renderEps(serie) {
            listaEps.innerHTML = "";
            let inicio = serie.start || 1;
            for (let i = inicio; i <= serie.total; i++) {
                let n = (serie.tipo === 'zero' && i < 10) ? "0" + i : i;
                let btn = document.createElement('button');
                btn.innerText = i;
                btn.onclick = () => {
                    hls.destroy();
                    hls = new Hls();
                    hls.loadSource(`https://cdn-s01.mywallpaper-4k-image.net/stream/${serie.pasta}/${n}.mp4/index.m3u8`);
                    hls.attachMedia(video);
                    video.play();
                    interfaceDiv.classList.add('oculto');
                };
                listaEps.appendChild(btn);
            }
        }

        // CONTROLE TOTAL DE TECLAS
        document.addEventListener('keydown', (e) => {
            switch(e.keyCode) {
                case 13: // Botão OK
                    if (interfaceDiv.classList.contains('oculto')) {
                        video.paused ? video.play() : video.pause();
                    }
                    break;
                case 8: // Botão Voltar
                case 27:
                    e.preventDefault();
                    interfaceDiv.classList.remove('oculto');
                    break;
                case 37: // Seta esquerda (Voltar 10s)
                    video.currentTime -= 10;
                    break;
                case 39: // Seta direita (Avançar 10s)
                    video.currentTime += 10;
                    break;
            }
        });
    </script>
</body>
</html>
