<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TV STREAM - Perfis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund01.jpg');
            background-size: cover;
            background-position: center;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        .tela {
            display: none;
            width: 100vw;
            height: 100vh;
            padding: 40px;
        }

        .tela.ativa {
            display: block;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 36px;
        }

        h3 {
            font-size: 26px;
            margin: 30px 0 20px;
            text-align: center;
            color: #ffcc00;
        }

        .voltar {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            outline: none;
        }

        .focado {
            border: 4px solid #0099ff !important;
            box-shadow: 0 0 20px #0099ff;
            transform: scale(1.05);
            transition: all 0.2s ease;
        }

        .lista-perfis {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            justify-items: center;
        }

        .perfil-item {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            width: 220px;
            cursor: pointer;
            outline: none;
            border: 3px solid transparent;
        }

        .perfil-item img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: none;
        }

        .perfil-item p {
            font-size: 26px;
            font-weight: bold;
        }

        .botao {
            padding: 20px 40px;
            font-size: 28px;
            background: #0099ff;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            outline: none;
        }

        .form-container {
            max-width: 600px;
            margin: 80px auto;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 20px;
            font-size: 28px;
            margin: 20px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        .grade-avatares {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
            justify-items: center;
        }

        .avatar-opcao {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid transparent;
            outline: none;
            background: #222;
        }

        .grade-fundos {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
            justify-items: center;
        }

        .fundo-opcao {
            width: 160px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid transparent;
            outline: none;
            background: #222;
        }

        .categoria {
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

<!-- 📺 Tela Principal TV STREAM -->
<div id="tela-inicial" class="tela ativa">
    <h1>TV STREAM</h1>
    <h2>Quem está assistindo?</h2>
    <div class="lista-perfis" id="listaPerfis"></div>
    <div style="text-align: center; margin-top: 40px;">
        <button class="botao" id="btnNovoPerfil" tabindex="0">+ Novo Perfil</button>
    </div>
</div>

<!-- 📝 Digitar Nome do Perfil -->
<div id="tela-nome" class="tela">
    <button class="voltar" id="voltarNome" tabindex="0">← Voltar</button>
    <h2>Criar Novo Perfil</h2>
    <div class="form-container">
        <label style="font-size: 28px;">Digite seu nome:</label>
        <input type="text" id="inputNome" placeholder="Ex: Felipe" tabindex="0">
        <br>
        <button class="botao" id="btnEscolherAvatar" tabindex="0" style="width:100%; margin-top:20px;">Escolher Imagem</button>
    </div>
</div>

<!-- 🎭 Escolher Imagem de Perfil -->
<div id="tela-avatar" class="tela">
    <button class="voltar" id="voltarAvatar" tabindex="0">← Voltar</button>
    <h2>Escolha sua Imagem de Perfil</h2>

    <div class="categoria">
        <h3>Masculino</h3>
        <div class="grade-avatares">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc01.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc02.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc03.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc04.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc05.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc06.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc07.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc08.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc09.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc10.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc11.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc12.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc13.jpg" tabindex="0">
        </div>
    </div>

    <div class="categoria">
        <h3>Feminino</h3>
        <div class="grade-avatares">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin01.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin02.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin03.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin04.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin05.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin06.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin07.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin08.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin09.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin10.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin11.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin12.jpg" tabindex="0">
            <img class="avatar-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin13.jpg" tabindex="0">
        </div>
    </div>
</div>

<!-- 🖼️ Escolher Fundo -->
<div id="tela-fundo" class="tela">
    <button class="voltar" id="voltarFundo" tabindex="0">← Voltar</button>
    <h2>Escolha o Fundo da Tela</h2>
    <div class="categoria">
        <div class="grade-fundos">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund01.jpg" tabindex="0">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund02.jpg" tabindex="0">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund03.jpg" tabindex="0">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund04.jpg" tabindex="0">
            <img class="fundo-opcao" src="https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/fund05.jpg" tabindex="0">
        </div>
    </div>
</div>

<script>
let perfis = JSON.parse(localStorage.getItem('perfisTVSTREAM')) || [];
let nomeAtual = '';
let avatarAtual = '';

// --------------------
// Funções básicas
// --------------------
function carregarPerfis() {
    const container = document.getElementById('listaPerfis');
    container.innerHTML = '';
    perfis.forEach((perfil, index) => {
        const div = document.createElement('div');
        div.className = 'perfil-item';
        div.tabIndex = 0;
        div.innerHTML = `<img src="${perfil.avatar}" alt=""><p>${perfil.nome}</p>`;
        div.onclick = () => entrarNoPerfil(perfil);
        div.onkeydown = (e) => { if (e.key === 'Enter') entrarNoPerfil(perfil); };
        container.appendChild(div);
    });
    focarPrimeiro();
}

// ✅ Ao entrar no perfil: abre o sistema principal
function entrarNoPerfil(perfil) {
    alert(`✅ Entrando no perfil: ${perfil.nome}`);
    // ⬇️ COLOQUE AQUI O LINK DO SEU SISTEMA PRINCIPAL
    window.location.href = "seu-sistema-principal.html";
}

function salvarPerfil(nome, avatar, fundo) {
    perfis.push({ nome, avatar, fundo });
    localStorage.setItem('perfisTVSTREAM', JSON.stringify(perfis));
    trocarTela('tela-inicial');
    carregarPerfis();
}

function trocarTela(id) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
    setTimeout(focarPrimeiro, 50);
}

function focarPrimeiro() {
    const primeiro = document.querySelector('.ativa [tabindex="0"]');
    if (primeiro) primeiro.focus();
}

// --------------------
// Destaque de foco
// --------------------
function atualizarFoco() {
    document.querySelectorAll('.focado').forEach(el => el.classList.remove('focado'));
    if (document.activeElement && document.activeElement.hasAttribute('tabindex')) {
        document.activeElement.classList.add('focado');
    }
}

// --------------------
// Navegação por SETAS e ENTER
// --------------------
document.addEventListener('keydown', (e) => {
    const focado = document.activeElement;
    if (!focado || !focado.hasAttribute('tabindex')) return;

    const itens = Array.from(focado.parentElement.querySelectorAll('[tabindex="0"]'));
    const idx = itens.indexOf(focado);
    const colunas = window.innerWidth > 1000 ? 5 : window.innerWidth > 700 ? 4 : 3;

    switch (e.key) {
        case 'ArrowRight':
            if (idx + 1 < itens.length) itens[idx + 1].focus();
            break;
        case 'ArrowLeft':
            if (idx - 1 >= 0) itens[idx - 1].focus();
            break;
        case 'ArrowDown':
            if (idx + colunas < itens.length) itens[idx + colunas].focus();
            break;
        case 'ArrowUp':
            if (idx - colunas >= 0) itens[idx - colunas].focus();
            break;
        case 'Enter':
            e.preventDefault();
            if (focado.classList.contains('avatar-opcao')) {
                avatarAtual = focado.src;
                trocarTela('tela-fundo');
            } else if (focado.classList.contains('fundo-opcao')) {
                salvarPerfil(nomeAtual, avatarAtual, focado.src);
            } else if (focado.id === 'btnNovoPerfil') {
                trocarTela('tela-nome');
            } else if (focado.id === 'btnEscolherAvatar') {
                nomeAtual = document.getElementById('inputNome').value.trim();
                if (!nomeAtual) { alert('Digite um nome válido!'); return; }
                trocarTela('tela-avatar');
            } else if (focado.classList.contains('voltar')) {
                voltarTela();
            } else if (focado.classList.contains('perfil-item')) {
                const perfil = perfis.find(p => p.nome === focado.querySelector('p').textContent);
                if (perfil) entrarNoPerfil(perfil);
            }
            break;
        case 'Escape':
            voltarTela();
            break;
    }
    atualizarFoco();
});

// --------------------
// Suporte ao MOUSE
// --------------------
document.addEventListener('click', (e) => {
    if (e.target.classList.contains('avatar-opcao')) {
        avatarAtual = e.target.src;
        trocarTela('tela-fundo');
    }
    if (e.target.classList.contains('fundo-opcao')) {
        if (nomeAtual && avatarAtual) salvarPerfil(nomeAtual, avatarAtual, e.target.src);
    }
    atualizarFoco();
});

// --------------------
// Botões de voltar
// --------------------
function voltarTela() {
    const telaAtual = document.querySelector('.tela.ativa').id;
    if (telaAtual === 'tela-nome') trocarTela('tela-inicial');
    if (telaAtual === 'tela-avatar') trocarTela('tela-nome');
    if (telaAtual === 'tela-fundo') trocarTela('tela-avatar');
}

document.getElementById('voltarNome').onclick = () => trocarTela('tela-inicial');
document.getElementById('voltarAvatar').onclick = () => trocarTela('tela-nome');
document.getElementById('voltarFundo').onclick = () => trocarTela('tela-avatar');
document.getElementById('btnNovoPerfil').onclick = () => trocarTela('tela-nome');
document.getElementById('btnEscolherAvatar').onclick = () => {
    nomeAtual = document.getElementById('inputNome').value.trim();
    if (!nomeAtual) { alert('Digite um nome válido!'); return; }
    trocarTela('tela-avatar');
};

window.onload = carregarPerfis;
</script>

</body>
</html>
